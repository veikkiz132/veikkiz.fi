<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veikkiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
}

/* Hampurilaisvalikko */
.menu-btn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:40px;
    color:#ff0000;
    cursor:pointer;
    text-shadow:0 0 15px red;
    z-index:1000;
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#111;
    transition:.35s;
    padding-top:80px;
    box-shadow:0 0 25px red;
    z-index:999;
}

.sidebar a{
    display:block;
    padding:18px 30px;
    color:#00fff7;
    text-decoration:none;
    font-size:22px;
    transition:.2s;
}

.sidebar a:hover{
    background:#ff0000;
    color:white;
}

.page{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#logo{
    font-size:90px;
    color:#ff0000;
    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red,
        0 0 80px red;
    cursor:pointer;
}

#logo:hover{
    transform:scale(1.05);
}

.info{
    color:#00fff7;
    margin-top:20px;
    font-size:22px;
    text-shadow:0 0 10px cyan;
}

#about,#social{
    display:none;
    padding:40px;
}

h1{
    color:#ff0000;
    margin-bottom:30px;
    text-shadow:0 0 15px red;
}

p{
    font-size:24px;
    max-width:900px;
    line-height:1.7;
}

.yt{
    display:inline-block;
    margin-top:30px;
    padding:18px 35px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:22px;
    box-shadow:0 0 20px red;
}

.yt:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="menu-btn" onclick="menu()">☰</div>

<div class="sidebar" id="sidebar">
    <a href="#" onclick="etusivu()">🏠 Etusivu</a>
    <a href="#" onclick="tietoa()">👤 Tietoa</a>
    <a href="#" onclick="some()">📺 Some</a>
</div>

<div class="page" id="home">
    <div id="logo" onclick="tietoa()">
        VEIKKIZ
    </div>

    <div class="info">
        Paina tekstiä niin pääset lisätietoihin
    </div>
</div>

<div class="page" id="about">
    <h1>VEIKKIZ</h1>

    <p>
        Moi! Oon Veikka, paremmin YouTubessa nimellä <b>Veikkiz</b>.<br><br>

        Teen tänne pelivideoita mm. Minecraftia, FS22:ta ja monia muita pelejä.<br><br>

        Teen myös joskus musiikkia.
    </p>
</div>

<div class="page" id="social">
    <h1>Some</h1>
     <a class="social youtube"
       href="https://www.youtube.com/@veikkizyt_official"
       target="_blank">
       📺 YouTube
    </a>

    <a class="social instagram"
       href="https://www.instagram.com/official.veikkizyt"
       target="_blank">
       📷 Instagram
    </a>

    <a class="social tiktok"
       href="https://www.tiktok.com/@official_veikkiz"
       target="_blank">
       🎵 TikTok
    </a>

    <a class="social twitch"
       href="https://www.twitch.tv/veikkalehtone"
       target="_blank">
       🎮 Twitch
    </a>

    <a class="social discord"
       href="https://discord.gg/y6tcd3Nh"
       target="_blank">
       💬 Discord
    </a>
</div>

<script>
let open=false;

function menu(){
    if(open){
        document.getElementById("sidebar").style.left="-260px";
        open=false;
    }else{
        document.getElementById("sidebar").style.left="0";
        open=true;
    }
}

function hidePages(){
    document.getElementById("home").style.display="none";
    document.getElementById("about").style.display="none";
    document.getElementById("social").style.display="none";
    document.getElementById("sidebar").style.left="-260px";
    open=false;
}

function etusivu(){
    hidePages();
    document.getElementById("home").style.display="flex";
}

function tietoa(){
    hidePages();
    document.getElementById("about").style.display="flex";
}

function some(){
    hidePages();
    document.getElementById("social").style.display="flex";
}
</script>

</body>
</html>
